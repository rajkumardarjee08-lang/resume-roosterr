<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Rooster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';</script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #fce7f3;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .rooster-icon {
            font-size: 3rem;
            color: #db2777;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-20px);
            }

            60% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-pink-100 to-rose-200 min-h-screen text-slate-800 flex flex-col items-center p-4">

    <!-- Header -->
    <header class="text-center mb-8 mt-12">
        <div class="rooster-icon mb-4"><i class="fa-solid fa-microphone-lines"></i></div>
        <h1 class="text-4xl font-bold text-rose-600 mb-2">Resume Rooster</h1>
        <p class="text-rose-800/70 text-lg">Your AI-powered interview coach</p>
    </header>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="glass p-8 rounded-2xl max-w-sm w-full shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-rose-700">Setup</h2>
            <input type="password" id="apiKeyInput" placeholder="Gemini API Key"
                class="w-full bg-white/50 border border-rose-200 rounded-lg p-3 mb-4 focus:outline-none focus:border-rose-500">
            <button onclick="saveApiKey()"
                class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 rounded-lg transition transform active:scale-95">Let's
                Prep!</button>
        </div>
    </div>

    <!-- Main Card -->
    <main class="glass rounded-3xl p-8 max-w-2xl w-full shadow-xl relative overflow-hidden" id="mainContainer">

        <!-- Step 1: Upload -->
        <div id="step1" class="text-center transition-all duration-500">
            <h2 class="text-2xl font-bold mb-6 text-slate-700">Upload Your Resume</h2>
            <div class="border-2 border-dashed border-rose-300 rounded-xl p-10 cursor-pointer hover:bg-rose-50 transition"
                onclick="document.getElementById('resumeInput').click()">
                <input type="file" id="resumeInput" accept=".pdf,.txt" class="hidden"
                    onchange="handleResumeUpload(event)">
                <i class="fa-solid fa-file-pdf text-5xl text-rose-400 mb-4"></i>
                <p class="text-slate-500">Click to upload PDF or TXT</p>
            </div>
            <textarea id="resumeText"
                class="w-full mt-6 h-32 p-4 border border-rose-200 rounded-lg focus:outline-none focus:border-rose-500 hidden"
                placeholder="Or paste your resume text here..."></textarea>
            <button onclick="generateQuestions()" id="startBtn" disabled
                class="mt-6 bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                Generate Questions
            </button>
        </div>

        <!-- Step 2: Interview Loop -->
        <div id="step2" class="hidden text-center">
            <div class="mb-8">
                <span
                    class="bg-rose-100 text-rose-600 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-2 inline-block">Question
                    <span id="qIndex">1</span>/3</span>
                <h3 id="questionText" class="text-2xl font-semibold text-slate-800 leading-relaxed mb-8">Loading
                    question...</h3>

                <div class="relative w-24 h-24 mx-auto mb-6">
                    <button onclick="toggleRecording()" id="micBtn"
                        class="w-full h-full rounded-full bg-rose-500 hover:bg-rose-600 text-white text-3xl shadow-xl transition transform active:scale-90 flex items-center justify-center relative z-10">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                    <div id="micPulse" class="absolute inset-0 rounded-full bg-rose-400 opacity-75 animate-ping hidden">
                    </div>
                </div>
                <p id="micStatus" class="text-sm text-slate-500 mb-4">Tap to Answer</p>
            </div>

            <!-- Critique Area -->
            <div id="critiqueArea" class="hidden text-left bg-white/50 p-6 rounded-xl border-l-4 border-rose-400">
                <h4 class="font-bold text-rose-600 mb-2"><i class="fa-solid fa-robot mr-2"></i>Coach's Feedback:</h4>
                <p id="critiqueText" class="text-slate-700 text-sm leading-relaxed"></p>
                <div class="mt-4 text-center">
                    <button onclick="nextQuestion()"
                        class="bg-slate-800 text-white px-6 py-2 rounded-lg hover:bg-slate-700 transition">Next Question
                        <i class="fa-solid fa-arrow-right ml-2"></i></button>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- State ---
        let apiKey = localStorage.getItem('gemini_api_key');
        let resumeContent = "";
        let questions = [];
        let currentQIndex = 0;
        let recognition = null;
        let isRecording = false;

        // --- Logic ---
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('apiKeyInput').value = apiKey || "";
            if (!apiKey) document.getElementById('settingsModal').classList.remove('hidden');

            // Setup Speech Recognition
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.onresult = (event) => {
                    // Just visual feedback could go here
                };
            } else {
                alert("Speech Recognition not supported in this browser. Please use Chrome.");
            }
        });

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value;
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                apiKey = key;
                document.getElementById('settingsModal').classList.add('hidden');
            }
        }

        async function handleResumeUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            if (file.type === "application/pdf") {
                reader.onload = async function () {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let text = "";
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(item => item.str).join(" ") + "\\n";
                    }
                    resumeContent = text;
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('resumeText').value = text; // Show extracted text
                    document.getElementById('resumeText').classList.remove('hidden');
                };
                reader.readAsArrayBuffer(file);
            } else {
                reader.onload = (e) => {
                    resumeContent = e.target.result;
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('resumeText').value = resumeContent;
                    document.getElementById('resumeText').classList.remove('hidden');
                };
                reader.readAsText(file);
            }
        }

        async function generateQuestions() {
            if (!resumeContent) return;
            const btn = document.getElementById('startBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Analyzing...';
            btn.disabled = true;

            try {
                const prompt = `Based on this resume, generate 3 specific technical interview questions. 
                Return strictly valid JSON array of strings: ["Question 1", "Question 2", "Question 3"]. 
                Resume: ${resumeContent.substring(0, 3000)}`; // Limit char count

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                let text = data.candidates[0].content.parts[0].text;
                text = text.replace(/```json/g, '').replace(/```/g, '').trim();

                try {
                    questions = JSON.parse(text);
                } catch (e) {
                    const match = text.match(/\[.*\]/s);
                    if (match) questions = JSON.parse(match[0]);
                    else throw new Error("Invalid format from AI");
                }

                // Transition UI
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                showQuestion(0);

            } catch (e) {
                console.error(e);
                alert("Failed to generate questions: " + e.message);
                btn.innerHTML = 'Generate Questions';
                btn.disabled = false;
            }
        }

        function showQuestion(index) {
            currentQIndex = index;
            document.getElementById('qIndex').innerText = index + 1;
            document.getElementById('questionText').innerText = questions[index];
            document.getElementById('critiqueArea').classList.add('hidden');
            document.getElementById('micBtn').classList.remove('bg-gray-400');
            document.getElementById('micBtn').classList.add('bg-rose-500');
            document.getElementById('micStatus').innerText = "Tap to Answer";

            // Speak Question
            const utterance = new SpeechSynthesisUtterance(questions[index]);
            window.speechSynthesis.speak(utterance);
        }

        let finalTranscript = "";

        function toggleRecording() {
            if (!isRecording) {
                // Start
                finalTranscript = "";
                recognition.start();
                isRecording = true;
                document.getElementById('micPulse').classList.remove('hidden');
                document.getElementById('micBtn').innerHTML = '<i class="fa-solid fa-stop"></i>';
                document.getElementById('micStatus').innerText = "Listening...";

                recognition.onresult = (event) => {
                    let interim = "";
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                        else interim += event.results[i][0].transcript;
                    }
                };
            } else {
                // Stop & Analyze
                recognition.stop();
                isRecording = false;
                document.getElementById('micPulse').classList.add('hidden');
                document.getElementById('micBtn').innerHTML = '<i class="fa-solid fa-microphone"></i>';
                document.getElementById('micStatus').innerText = "Analyzing answer...";

                // Wait briefly for final transcript
                setTimeout(() => analyzeAnswer(finalTranscript), 1000);
            }
        }

        async function analyzeAnswer(userAnswer) {
            if (!userAnswer) {
                alert("I didn't hear anything. Please try again.");
                return;
            }

            const prompt = `Question: "${questions[currentQIndex]}"
            User Answer: "${userAnswer}"
            Critique this answer in 2-3 sentences. Be constructive. Highlight what was good and what was missing.`;

            const critiqueArea = document.getElementById('critiqueArea');
            const critiqueText = document.getElementById('critiqueText');

            critiqueArea.classList.remove('hidden');
            critiqueText.innerText = "Thinking...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const feedback = data.candidates[0].content.parts[0].text;

                critiqueText.innerText = feedback;

                // Speak Feedback
                const utterance = new SpeechSynthesisUtterance(feedback);
                window.speechSynthesis.speak(utterance);

            } catch (e) {
                critiqueText.innerText = "Error getting feedback.";
            }
        }

        function nextQuestion() {
            if (currentQIndex < questions.length - 1) {
                showQuestion(currentQIndex + 1);
            } else {
                alert("Interview Complete! Great job.");
                location.reload();
            }
        }
    </script>
</body>

</html>
